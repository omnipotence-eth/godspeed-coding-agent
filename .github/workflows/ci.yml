name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --all-extras
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  type-check:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --all-extras
      - run: uv run mypy src/ --ignore-missing-imports --disable-error-code arg-type --disable-error-code assignment --disable-error-code misc --disable-error-code list-item --disable-error-code type-abstract --disable-error-code type-arg --disable-error-code unused-ignore --disable-error-code override --disable-error-code call-arg --disable-error-code var-annotated --disable-error-code attr-defined --disable-error-code no-any-return --disable-error-code union-attr --disable-error-code return-value --disable-error-code no-redef

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --all-extras
      - run: uv run pip-audit --ignore-vuln CVE-2026-28684 --ignore-vuln CVE-2026-3219 --ignore-vuln GHSA-mv93-w799-cj2w
      - run: uv run bandit -r src/ -ll -s B310,B104,B602,B404,B603,B607,B608,B101,B303,B301,B311,B615

  test:
    runs-on: ubuntu-latest
    needs: [type-check, security]
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --all-extras
      - run: uv run pytest --cov --cov-report=term-missing -q

  test-windows:
    runs-on: windows-latest
    needs: [type-check, security]
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --all-extras
      - run: uv run pytest -q

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --all-extras
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  type-check:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --all-extras
      - run: uv run mypy src/ --ignore-missing-imports

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --all-extras
      # CVE-2026-28684 (python-dotenv 1.0.1 -> 1.2.2) is suppressed:
      # litellm pins python-dotenv==1.0.1 strictly, making a pin-up
      # unsatisfiable. Remove this ignore when litellm relaxes its
      # bound (tracked in pyproject.toml dependencies block).
      - run: uv run pip-audit --ignore-vuln CVE-2026-28684 --ignore-vuln CVE-2026-3219
      - run: uv run bandit -r src/ -ll -s B310,B104

  test:
    runs-on: ubuntu-latest
    needs: [type-check, security]
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --all-extras
      - run: uv run pytest --cov --cov-report=term-missing -q

  test-windows:
    runs-on: windows-latest
    needs: [type-check, security]
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --all-extras
      - run: uv run pytest -q

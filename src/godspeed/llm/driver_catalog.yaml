    cost_per_mtok_in: 0.0
    cost_per_mtok_out: 0.0
    known_ceilings:
      swe_bench_lite_dev_23_n3_mean: 0.217
      swe_bench_lite_dev_23_n3_std: 0.044
    notes: "N=3 mean 21.7% +/- 4.4pp on dev-23. Broader multi-seed baseline."

